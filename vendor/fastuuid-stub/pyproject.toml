[project]
name = "fastuuid"
version = "0.14.0+strix"
description = "stdlib uuid re-export; PyPI fastuuid has no FreeBSD wheels (litellm dependency)"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
authors = [{ name = "Strix", email = "hi@usestrix.com" }]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["fastuuid"]
