[project]
name = "tiktoken"
version = "0.12.0+strix"
description = "Rough OpenAI-style token counting without Rust (FreeBSD / no wheels)"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
authors = [{ name = "Strix", email = "hi@usestrix.com" }]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["tiktoken"]
